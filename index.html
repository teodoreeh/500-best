<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#05060E">
<meta name="description" content="Рандомайзер топ-500 фильмов Letterboxd — жми КРУТИТЬ и лови сигнал.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="500 BEST">
<script src="config.js"></script>
<title>500 BEST — CRT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05060E;--bg-2:#0A0D1C;--bg-3:#111633;--line:#1D2547;
  --cyan:#19E3E3;--magenta:#FF2E97;--gold:#FFC24B;--violet:#9B6BFF;
  --ink:#EAF2FF;--dim:#6E77A0;--lb-g:#00E054;--lb-o:#FF8000;--lb-b:#40BCF4;
  --mono:'JetBrains Mono',ui-monospace,monospace;--pixel:'Press Start 2P',var(--mono);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--mono);color:var(--ink);
  background:radial-gradient(115% 70% at 50% 0%,#101838 0%,#070a16 48%,var(--bg) 100%);
  min-height:100dvh;display:flex;justify-content:center;overflow-x:hidden;-webkit-font-smoothing:antialiased;user-select:none}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.14) 2px 3px);mix-blend-mode:multiply}
.cab{width:100%;max-width:440px;min-height:100dvh;display:flex;flex-direction:column;gap:13px;
  padding:16px 16px calc(18px + env(safe-area-inset-bottom))}
.shake{animation:shk .3s cubic-bezier(.36,.07,.19,.97)}
@keyframes shk{20%{transform:translate(2px,-2px)}40%{transform:translate(-4px,2px)}60%{transform:translate(4px,-1px)}80%{transform:translate(-2px,1px)}}

.top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mark .wm{font-family:var(--pixel);font-size:18px;color:var(--ink);
  text-shadow:0 0 12px rgba(234,242,255,.4),2px 2px 0 var(--magenta),-2px -2px 0 rgba(25,227,227,.5)}
.mark .st{font-size:9px;letter-spacing:3px;color:var(--dim);margin-top:8px}
.mark .st .led{color:var(--cyan)}
.ic{display:flex;gap:8px}
.ic button{width:40px;height:40px;border:1px solid var(--line);background:var(--bg-2);color:var(--dim);
  font-size:15px;cursor:pointer;border-radius:9px;display:grid;place-content:center;transition:.15s}
.ic button:hover{color:var(--ink);border-color:var(--cyan)}
.ic button.on{color:var(--gold);border-color:var(--gold)}
.ic button:active{transform:scale(.92)}

/* ── экран-монитор ── */
.screen{position:relative;flex:1;min-height:300px;border:1px solid var(--line);border-radius:14px;
  background:radial-gradient(120% 100% at 50% 40%,#0c1330 0%,#070b1a 68%,#04060f 100%);
  box-shadow:inset 0 0 70px rgba(0,0,0,.92),inset 0 0 0 1px rgba(255,255,255,.02),0 24px 60px -28px #000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px 22px;overflow:hidden;text-align:center}
.screen::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.28) 2px 3px)}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(110% 90% at 50% 45%,transparent 55%,rgba(0,0,0,.5) 100%)}
.brk{position:absolute;inset:14px;pointer-events:none;z-index:6;opacity:.4}
.brk b{position:absolute;width:15px;height:15px;border:2px solid var(--cyan)}
.brk .a{top:0;left:0;border-right:0;border-bottom:0}.brk .b{top:0;right:0;border-left:0;border-bottom:0}
.brk .c{bottom:0;left:0;border-right:0;border-top:0}.brk .d{bottom:0;right:0;border-left:0;border-top:0}
.flare{position:absolute;inset:0;z-index:1;opacity:0;pointer-events:none;background:radial-gradient(circle at 50% 42%,var(--fl,#19E3E3),transparent 60%)}
.flare.go{animation:flare .6s ease-out}
@keyframes flare{0%{opacity:.5}100%{opacity:0}}

.stamp{position:relative;z-index:7;font-weight:800;font-size:11px;letter-spacing:3px;padding:6px 14px;
  border:1px solid var(--tc,#19E3E3);border-radius:20px;color:var(--tc,#19E3E3);text-shadow:0 0 12px var(--tc,#19E3E3);
  opacity:0;transform:translateY(6px)}
.stamp.in{animation:stampIn .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes stampIn{to{opacity:1;transform:none}}

/* чистый постер, единый размер, поверх сканлайнов */
.poster{position:relative;z-index:7;width:140px;height:210px;border-radius:9px;overflow:hidden;flex:none;
  border:1px solid var(--tc,#19E3E3);background:var(--bg-3);
  box-shadow:0 12px 34px -10px #000,0 0 22px -8px var(--tc,#19E3E3)}
.poster img{width:100%;height:100%;object-fit:cover;display:block}
.poster .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 30% 20%,color-mix(in srgb,var(--tc) 30%,transparent),transparent 55%),linear-gradient(160deg,#161a3c,#0a0d1c)}
.poster .ph b{font-weight:800;font-size:40px;color:rgba(234,242,255,.6);letter-spacing:-1px}

.info{position:relative;z-index:7;display:flex;flex-direction:column;gap:5px;align-items:center}
.rank{font-weight:800;font-size:18px;letter-spacing:1px;color:var(--ink);
  text-shadow:-2px 0 var(--magenta),2px 0 var(--cyan)}
.rank small{color:var(--dim);font-size:.7em}
.title{font-weight:800;font-size:clamp(18px,5vw,22px);line-height:1.14;letter-spacing:.4px;max-width:340px;
  text-shadow:0 0 16px rgba(234,242,255,.22),-1.2px 0 rgba(255,46,151,.5),1.2px 0 rgba(25,227,227,.45)}
.title.scram{color:var(--dim);text-shadow:0 0 8px rgba(110,119,160,.4)}
.year{font-size:11px;letter-spacing:3px;color:var(--dim)}
.reveal.pop{animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(1.05)}60%{transform:scale(.99)}100%{transform:scale(1)}}
.reveal{position:relative;z-index:7;display:flex;flex-direction:column;align-items:center;gap:14px}

/* действия */
.acts{display:flex;gap:9px}
.act{flex:1;height:44px;border-radius:11px;border:1px solid var(--line);background:var(--bg-2);
  font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:1.5px;color:var(--ink);
  display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.15s}
.act:active{transform:translateY(2px)}.act:disabled{opacity:.35;cursor:not-allowed}
.act.lb:hover{border-color:var(--lb-g)}.act.add:hover{border-color:var(--gold)}
.act.add .pl{color:var(--gold);font-weight:800;font-size:15px;text-shadow:0 0 10px var(--gold)}
.act.add.done{border-color:var(--gold);color:var(--gold);background:rgba(255,194,75,.08)}
.dots{display:inline-flex;gap:4px}
.dots i{width:8px;height:8px;border-radius:50%}
.dots i:nth-child(1){background:var(--lb-g)}.dots i:nth-child(2){background:var(--lb-o)}.dots i:nth-child(3){background:var(--lb-b)}

/* гейджи */
.gauges{display:flex;flex-direction:column;gap:7px}
.g{display:flex;align-items:center;gap:10px;font-size:9px;letter-spacing:2px;color:var(--dim)}
.g .nm{width:56px;flex:none;color:var(--gc)}
.segs{flex:1;display:flex;gap:3px;height:11px}
.segs i{flex:1;background:var(--bg-3);border-radius:2px;transition:.25s}
.segs i.on{background:var(--gc);box-shadow:0 0 8px var(--gc)}
.segs i.pulse{animation:segpop .35s ease}
@keyframes segpop{50%{transform:scaleY(1.7);filter:brightness(1.7)}}
.gbar{flex:1;height:11px;background:var(--bg-3);border-radius:6px;overflow:hidden}
.gbar>span{display:block;height:100%;width:0;background:var(--gc);box-shadow:0 0 10px var(--gc);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.g .ct{width:50px;flex:none;text-align:right;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}

/* КРУТИТЬ */
.roll{width:100%;position:relative;height:68px;cursor:pointer;border-radius:14px;border:2px solid var(--magenta);
  background:linear-gradient(180deg,#1a0a1f,#0c0512);color:var(--ink);font-family:var(--mono);font-weight:800;
  font-size:18px;letter-spacing:6px;display:flex;align-items:center;justify-content:center;gap:16px;
  box-shadow:0 6px 0 #4a0f2c,0 0 30px -6px var(--magenta),inset 0 0 24px rgba(255,46,151,.14);transition:transform .09s,box-shadow .12s}
.roll:active{transform:translateY(6px);box-shadow:0 0 0 #4a0f2c,0 0 22px -6px var(--magenta),inset 0 0 30px rgba(255,46,151,.22)}
.roll .die{width:30px;height:30px}
.roll .die.spin{animation:crank .26s linear infinite}
@keyframes crank{0%{transform:rotate(0) scale(1)}25%{transform:rotate(120deg) scale(.86)}50%{transform:rotate(180deg) scale(1.08)}75%{transform:rotate(300deg) scale(.86)}100%{transform:rotate(360deg) scale(1)}}
.roll .die.land{animation:diland .5s cubic-bezier(.3,1.8,.5,1)}
@keyframes diland{0%{transform:scale(1.55) rotate(-20deg)}55%{transform:scale(.9) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
#dieNum.flash{animation:nflash .5s ease}
@keyframes nflash{0%{fill:#fff}100%{fill:var(--gold)}}

.parts{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
.pt{position:absolute;width:8px;height:8px;border-radius:2px}

/* ── VHS коллекция ── */
.ov{position:fixed;inset:0;z-index:70;background:rgba(3,5,12,.9);backdrop-filter:blur(7px);display:none;justify-content:center;align-items:flex-end}
.ov.show{display:flex}
.sheet{width:100%;max-width:440px;height:88dvh;background:linear-gradient(180deg,#0c0f1f,#070a15);
  border:1px solid var(--line);border-top:3px solid var(--violet);border-radius:16px 16px 0 0;
  display:flex;flex-direction:column;animation:rise .3s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.sheet .h{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px}
.sheet .h .ttl{font-family:var(--pixel);font-size:12px;color:var(--ink)}
.sheet .h .ttl span{display:block;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:2px;margin-top:8px}
.sheet .h .x{width:34px;height:34px;border:1px solid var(--line);background:var(--bg-3);color:var(--dim);border-radius:8px;cursor:pointer;flex:none}
.shelf{flex:1;overflow-y:auto;padding:6px 18px 24px}
.shelf::-webkit-scrollbar{width:6px}.shelf::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.tape{position:relative;display:flex;align-items:stretch;min-height:70px;margin-bottom:10px;border-radius:6px;overflow:hidden;
  background:repeating-linear-gradient(180deg,#171b30 0 4px,#13172a 4px 8px);border:1px solid #232a4d;
  box-shadow:0 4px 14px -6px #000,inset 0 1px 0 rgba(255,255,255,.04);
  opacity:0;transform:translateX(-16px);transition:opacity .42s ease,transform .22s cubic-bezier(.2,.9,.3,1)}
.tape.in{opacity:1;transform:translateX(0)}
.tape.in:hover{transform:translateX(8px)}
.tape .spine{width:8px;flex:none;background:var(--tc)}
.tape.t2 .spine{box-shadow:0 0 12px var(--gold)}
.tape .lbl{flex:1;margin:8px;background:linear-gradient(180deg,#ece9dc,#dcd8c6);border-radius:3px;
  display:flex;flex-direction:column;justify-content:center;gap:3px;padding:9px 13px;min-width:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1)}
.tape .lbl .rk{font-size:9px;font-weight:800;letter-spacing:1px}
.tape.t0 .lbl .rk{color:#0a6b6b}.tape.t1 .lbl .rk{color:#a01464}.tape.t2 .lbl .rk{color:#8a5a00}
.tape .lbl .nm{font-size:12px;font-weight:700;color:#20232e;font-family:var(--mono);line-height:1.28;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tape .lbl .yr{font-size:8px;color:#5a5a52;letter-spacing:1px}
.tape .side{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:0 12px}
.tape .lbbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 10px;border:1px solid var(--line);
  border-radius:20px;background:#0d1122;text-decoration:none;transition:.15s;cursor:pointer}
.tape .lbbtn:hover{border-color:var(--lb-g);background:#0e1a17}
.tape .lbbtn .dots i{width:6px;height:6px}
.tape .rm{color:#4a5170;cursor:pointer;font-size:14px;line-height:1;padding:2px}.tape .rm:hover{color:var(--magenta)}
.empty{text-align:center;color:var(--dim);font-size:12px;line-height:1.8;padding:50px 20px}
.sheet.sync{max-width:440px}
.syncBody{padding:2px}
.sx{font-size:12px;line-height:1.6;color:var(--ink);margin:10px 4px}
.sx.dim{color:var(--dim)}.sx.ok{color:var(--lb-g);font-weight:700}
.sxor{text-align:center;color:var(--dim);font-size:11px;letter-spacing:1px;margin:16px 0 6px}
.syncbtn{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--bg-3);color:var(--ink);font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.5px;cursor:pointer;transition:.15s}
.syncbtn:hover{border-color:var(--cyan);background:#0e1836}
.syncbtn.go{background:linear-gradient(180deg,#0b2b3a,#0a1b2e);border-color:var(--cyan);color:var(--cyan)}
.syncbtn.danger:hover{border-color:var(--magenta);color:var(--magenta);background:#2a0d1c}
.sxrow{display:flex;gap:8px;margin:8px 4px}
.sxrow2{display:flex;gap:8px;margin:14px 4px 4px}
.sxrow input{flex:1;min-width:0;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:12px}
.sxrow input.bad{border-color:var(--magenta)}
.sxrow .syncbtn{width:auto;white-space:nowrap}
.code{color:var(--gold);word-break:break-all;font-weight:700}
.cred{margin:16px 6px 2px;text-align:center;font-size:9px;letter-spacing:.5px;color:var(--dim);line-height:1.7}
.cred a{color:var(--dim);text-decoration:underline;text-underline-offset:2px}
.cred a:hover{color:var(--cyan)}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.cab.boot{animation:boot .9s ease-out}
@keyframes boot{0%{opacity:0}10%{opacity:.5}16%{opacity:.1}26%{opacity:.9}38%{opacity:.35}100%{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition:none!important}}
</style>
</head>
<body>
<main class="cab boot" id="cab">
  <header class="top">
    <div class="mark"><div class="wm">500 BEST</div>
      <div class="st"><span class="led">◉</span> SIGNAL // TOP-500 · LETTERBOXD</div></div>
    <div class="ic"><button id="sound" class="on" title="Звук">♪</button>
      <button id="openSync" title="Синхронизация" hidden>⇄</button>
      <button id="openCol" title="Коллекция">◈</button></div>
  </header>

  <section class="screen" id="screen">
    <div class="flare" id="flare"></div>
    <div class="brk"><b class="a"></b><b class="b"></b><b class="c"></b><b class="d"></b></div>
    <div class="reveal" id="reveal">
      <div class="stamp" id="stamp">◉ СИСТЕМА ГОТОВА</div>
      <div class="poster" id="poster"><div class="ph"><b>?</b></div></div>
      <div class="info">
        <div class="rank" id="rank">#000<small> /500</small></div>
        <div class="title" id="title">Жми КРУТИТЬ — поймай сигнал</div>
        <div class="year" id="year">····</div>
      </div>
    </div>
  </section>

  <section class="acts">
    <button class="act lb" id="lb" disabled><span class="dots"><i></i><i></i><i></i></span> LETTERBOXD</button>
    <button class="act add" id="add" disabled><span class="pl">＋</span> В КОЛЛЕКЦИЮ</button>
  </section>

  <section class="gauges">
    <div class="g" style="--gc:var(--gold)"><span class="nm">ТОП-10</span><div class="segs" id="s10"></div><span class="ct" id="c10">0/10</span></div>
    <div class="g" style="--gc:var(--magenta)"><span class="nm">ТОП-100</span><div class="gbar"><span id="b100"></span></div><span class="ct" id="c100">0/100</span></div>
    <div class="g" style="--gc:var(--cyan)"><span class="nm">ВСЁ</span><div class="gbar"><span id="b500"></span></div><span class="ct" id="c500">0/500</span></div>
  </section>

  <button class="roll" id="roll" aria-label="Крутить">
    <svg class="die" id="die" viewBox="0 0 48 48" fill="none">
      <path d="M24 3 44 15v18L24 45 4 33V15z" stroke="#fff" stroke-width="2"/>
      <path d="M24 3v21L4 15M24 24 44 15M24 24v21" stroke="#fff" stroke-width="1" opacity=".45"/>
      <text id="dieNum" x="24" y="27" text-anchor="middle" font-family="JetBrains Mono,monospace" font-weight="800" font-size="13" fill="var(--gold)">7</text>
    </svg>
    КРУТИТЬ
  </button>

  <footer class="cred">Рейтинг — <a href="https://letterboxd.com/" target="_blank" rel="noopener">Letterboxd</a> · постеры — <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a><br>Использует TMDB API, но не одобрен и не сертифицирован TMDB.</footer>
</main>

<div class="parts" id="parts"></div>
<div class="ov" id="ov">
  <div class="sheet">
    <div class="h"><div class="ttl">КОЛЛЕКЦИЯ<span id="colVal">0 / 500 КАССЕТ</span></div>
      <button class="x" id="closeCol">✕</button></div>
    <div class="shelf" id="shelf"></div>
  </div>
</div>
<div class="ov" id="syncOv">
  <div class="sheet sync">
    <div class="h"><div class="ttl">СИНХРОНИЗАЦИЯ</div>
      <button class="x" id="closeSync">✕</button></div>
    <div class="syncBody" id="syncBody"></div>
  </div>
</div>

const SNAPSHOT=MOVIES.slice();          // офлайн-снимок базы (работает по двойному клику)
let POSTER_URL={};                       // rank -> URL постера из enriched-базы (TMDB CDN)
// приоритет постера: URL из enriched → вшитый демо-постер (base64) → нет постера
const posterSrc=m=>POSTER_URL[m.rank]||POSTERS[m.rank]||null;
const postered=()=>MOVIES.filter(m=>posterSrc(m));
const $=id=>document.getElementById(id);
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
const store=(()=>{let ok=true;try{localStorage.setItem('_t','1');localStorage.removeItem('_t')}catch(e){ok=false}
  const mem={};return{get:k=>{try{return ok?localStorage.getItem(k):mem[k]??null}catch(e){return mem[k]??null}},
  set:(k,v)=>{try{ok?localStorage.setItem(k,v):(mem[k]=v)}catch(e){mem[k]=v}}}})();
let collected=new Set(JSON.parse(store.get('sb.col')||'[]'));
let colAt=+(store.get('sb.colAt')||0);   // метка времени последнего изменения коллекции (для синка)
let soundOn=store.get('sb.snd')!=='0',current=null,rolling=false;

const TIER=[
  {label:'◦ НАЙДЕН СИГНАЛ',color:'#19E3E3',parts:8, snd:()=>{tone(660,.07);tone(880,.12,'square',.05,.05)}},
  {label:'★ ТОП-100',       color:'#FF2E97',parts:18,snd:()=>{tone(660,.06);tone(988,.08,'square',.05,.06);tone(1319,.14,'square',.05,.13)}},
  {label:'◆ ТОП-10 · ПОБЕДА',color:'#FFC24B',parts:42,snd:()=>{[523,659,784,1046,1319].forEach((f,i)=>tone(f,.12,'square',.05,i*.07))}}
];
const tierOf=r=>r<=10?2:r<=100?1:0;

let ac=null;
function tone(f,d=.06,type='square',g=.05,at=0){if(!soundOn)return;
  try{ac=ac||new(AudioContext||webkitAudioContext)();const o=ac.createOscillator(),ga=ac.createGain();
  o.type=type;o.frequency.setValueAtTime(f,ac.currentTime+at);ga.gain.setValueAtTime(g,ac.currentTime+at);
  o.connect(ga);ga.connect(ac.destination);o.start(ac.currentTime+at);
  ga.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+at+d);o.stop(ac.currentTime+at+d)}catch(e){}}
function sweep(){if(!soundOn||reduce)return;try{ac=ac||new(AudioContext||webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';
  o.frequency.setValueAtTime(150,ac.currentTime);o.frequency.exponentialRampToValueAtTime(680,ac.currentTime+.5);
  g.gain.setValueAtTime(.03,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.55);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.55)}catch(e){}}

const ph=rank=>'<div class="ph"><b>#'+String(rank).padStart(3,'0')+'</b></div>';
function showPoster(m){
  const p=$('poster'),src=posterSrc(m);
  if(!src){p.innerHTML=ph(m.rank);return}
  const img=new Image();img.alt='';img.loading='lazy';
  img.onerror=()=>{p.innerHTML=ph(m.rank)};      // TMDB недоступен → заглушка с рангом
  img.src=src;p.innerHTML='';p.appendChild(img);
}
function paint(m){
  $('rank').innerHTML='#'+String(m.rank).padStart(3,'0')+'<small> /500</small>';
  $('title').textContent=m.title;$('year').textContent='· '+m.year+' ·';
}
function reveal(m,daily){
  current=m;showPoster(m);paint(m);
  const t=tierOf(m.rank),cfg=TIER[t];
  $('poster').style.setProperty('--tc',cfg.color);
  const st=$('stamp');st.textContent=daily?'◐ ФИЛЬМ ДНЯ':cfg.label;st.style.setProperty('--tc',cfg.color);
  st.classList.remove('in');void st.offsetWidth;st.classList.add('in');
  const fl=$('flare');fl.style.setProperty('--fl',cfg.color);fl.classList.remove('go');void fl.offsetWidth;fl.classList.add('go');
  const rv=$('reveal');rv.classList.remove('pop');void rv.offsetWidth;rv.classList.add('pop');
  if(!reduce&&t>=1){$('cab').classList.remove('shake');void $('cab').offsetWidth;$('cab').classList.add('shake')}
  cfg.snd();burst(cfg.color,cfg.parts);
  $('lb').disabled=false;$('add').disabled=false;
  const has=collected.has(m.rank);
  $('add').classList.toggle('done',has);
  $('add').innerHTML=has?'✓ В КОЛЛЕКЦИИ':'<span class="pl">＋</span> В КОЛЛЕКЦИЮ';
}
function burst(color,n){if(reduce||!n)return;
  const p=$('parts'),r=$('screen').getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height*.42,pal=[color,'#EAF2FF',color];
  for(let i=0;i<n;i++){const s=document.createElement('span');s.className='pt';
    s.style.left=cx+'px';s.style.top=cy+'px';s.style.background=pal[i%3];p.appendChild(s);
    const a=Math.random()*Math.PI*2,v=90+Math.random()*230;
    s.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},
      {transform:`translate(${Math.cos(a)*v-50}%,${Math.sin(a)*v+70}%) scale(0)`,opacity:0}],
      {duration:750+Math.random()*550,easing:'cubic-bezier(.15,.7,.3,1)'}).onfinish=()=>s.remove()}
}

function roll(){
  if(rolling)return;rolling=true;
  const avail=MOVIES.filter(m=>!collected.has(m.rank));const src=avail.length?avail:MOVIES;
  const chosen=src[Math.floor(Math.random()*src.length)];
  const die=$('die');die.classList.remove('land');die.classList.add('spin');$('dieNum').classList.remove('flash');sweep();
  $('lb').disabled=true;$('add').disabled=true;
  $('stamp').textContent='◦ ПОИСК';$('stamp').style.setProperty('--tc','#6E77A0');
  if(reduce){reveal(chosen);die.classList.remove('spin');rolling=false;return}
  $('title').classList.add('scram');
  const t0=performance.now(),DUR=680;let last=0;
  (function tick(now){const t=now-t0;
    if(t-last>55){
      const r=MOVIES[Math.floor(Math.random()*MOVIES.length)];
      $('rank').innerHTML='#'+String(r.rank).padStart(3,'0')+'<small> /500</small>';
      $('title').textContent=r.title;$('dieNum').textContent=1+Math.floor(Math.random()*12);
      // крутим постеры из имеющихся, чтобы видеть анимацию
      const pool=postered();
      if(pool.length){const s=posterSrc(pool[Math.floor(Math.random()*pool.length)]);
        $('poster').innerHTML='<img alt="" src="'+s+'">'}
      tone(300+Math.random()*550,.02,'square',.02);last=t}
    if(t<DUR)requestAnimationFrame(tick);
    else{die.classList.remove('spin');die.classList.add('land');
      $('dieNum').textContent=1+Math.floor(Math.random()*12);$('dieNum').classList.add('flash');
      $('title').classList.remove('scram');reveal(chosen);rolling=false}
  })(t0);
}

function buildSegs(){const s=$('s10');for(let i=0;i<10;i++)s.appendChild(document.createElement('i'))}
function updateGauges(added){
  const t10=[...collected].filter(r=>r<=10).length,t100=[...collected].filter(r=>r<=100).length,all=collected.size;
  const segs=$('s10').children;
  for(let i=0;i<10;i++){const on=i<t10,was=segs[i].classList.contains('on');segs[i].classList.toggle('on',on);
    if(on&&!was&&added){segs[i].classList.add('pulse');setTimeout(()=>segs[i].classList.remove('pulse'),400)}}
  $('c10').textContent=t10+'/10';$('b100').style.width=t100+'%';$('c100').textContent=t100+'/100';
  $('b500').style.width=(all/5)+'%';$('c500').textContent=all+'/500';$('colVal').textContent=all+' / 500 КАССЕТ';
}
function addCurrent(){
  if(!current||collected.has(current.rank))return;
  collected.add(current.rank);touchCol();
  $('add').classList.add('done');$('add').innerHTML='✓ В КОЛЛЕКЦИИ';
  updateGauges(true);tone(880,.05);tone(1175,.13,'square',.05,.05);schedulePush()}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function renderCol(){
  const l=$('shelf'),items=MOVIES.filter(m=>collected.has(m.rank)).sort((a,b)=>a.rank-b.rank);
  if(!items.length){l.innerHTML='<div class="empty">Полка пуста.<br>Поймай первый сигнал — и запиши кассету.</div>';return}
  l.innerHTML='';
  items.forEach((m,i)=>{const t=tierOf(m.rank),tc=TIER[t].color;const d=document.createElement('div');
    d.className='tape t'+t;d.style.setProperty('--tc',tc);
    d.innerHTML=`<div class="spine"></div>
      <div class="lbl"><div class="rk">#${String(m.rank).padStart(3,'0')} · ${['НАХОДКА','ТОП-100','ТОП-10'][t]}</div>
        <div class="nm">${esc(m.title)}</div><div class="yr">${m.year}</div></div>
      <div class="side"><a class="lbbtn" href="https://letterboxd.com/film/${m.id}/" target="_blank" rel="noopener"><span class="dots"><i></i><i></i><i></i></span></a>
        <span class="rm" data-r="${m.rank}">✕</span></div>`;
    l.appendChild(d);
    requestAnimationFrame(()=>setTimeout(()=>d.classList.add('in'),i*45));
  });
  l.querySelectorAll('.rm').forEach(b=>b.onclick=()=>{collected.delete(+b.dataset.r);
    touchCol();updateGauges();renderCol();
    if(current&&+b.dataset.r===current.rank){$('add').classList.remove('done');$('add').innerHTML='<span class="pl">＋</span> В КОЛЛЕКЦИЮ'}tone(220,.05);schedulePush()})}

$('roll').onclick=roll;
$('lb').onclick=()=>{if(current)open('https://letterboxd.com/film/'+current.id+'/','_blank')};
$('add').onclick=addCurrent;
$('sound').onclick=function(){soundOn=!soundOn;store.set('sb.snd',soundOn?'1':'0');this.classList.toggle('on',soundOn);if(soundOn)tone(660,.05)};
$('openCol').onclick=()=>{renderCol();$('ov').classList.add('show')};
$('closeCol').onclick=()=>$('ov').classList.remove('show');
$('ov').onclick=e=>{if(e.target===$('ov'))$('ov').classList.remove('show')};
addEventListener('keydown',e=>{if(e.code==='Space'&&e.target===document.body){e.preventDefault();roll()}
  if(e.key==='Escape'){$('ov').classList.remove('show');$('syncOv').classList.remove('show')}});

// ── Синхронизация коллекции между устройствами (анонимный «ящик» на Cloudflare) ──
const SYNC_API=(window.SYNC_API||'').replace(/\/+$/,'');
const ID_RE=/^[A-Za-z0-9_-]{16,64}$/;
let syncId=store.get('sb.sync')||'',syncTimer=null;

// сохранить коллекцию локально + обновить метку времени
function touchCol(){colAt=Date.now();store.set('sb.col',JSON.stringify([...collected]));store.set('sb.colAt',String(colAt))}
// случайный анонимный id-ячейка (33 симв., проходит проверку воркера)
function newSyncId(){let a;try{a=crypto.getRandomValues(new Uint8Array(16))}catch(e){a=Array.from({length:16},()=>Math.floor(Math.random()*256))}
  return 'b'+Array.from(a).map(b=>b.toString(16).padStart(2,'0')).join('')}

async function syncPush(){if(!SYNC_API||!syncId)return;
  try{await fetch(SYNC_API+'/v1/box/'+syncId,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({updatedAt:colAt||Date.now(),collected:[...collected]})})}catch(e){}}
function schedulePush(){if(!SYNC_API||!syncId)return;clearTimeout(syncTimer);syncTimer=setTimeout(syncPush,800)}

// применить коллекцию к экрану (гейджи, кнопка «в коллекцию», открытая полка)
function applyCol(){updateGauges();
  if(current){const has=collected.has(current.rank);$('add').classList.toggle('done',has);
    $('add').innerHTML=has?'✓ В КОЛЛЕКЦИИ':'<span class="pl">＋</span> В КОЛЛЕКЦИЮ'}
  if($('ov').classList.contains('show'))renderCol()}

// merge=true — при первом связывании устройства объединяем (чтобы ничего не потерять);
// иначе — «свежее побеждает» по метке времени
async function syncPull(merge){if(!SYNC_API||!syncId)return;
  let rem;try{const r=await fetch(SYNC_API+'/v1/box/'+syncId);if(!r.ok)return;rem=await r.json()}catch(e){return}
  if(!rem||!Array.isArray(rem.collected))return;
  const rAt=+rem.updatedAt||0;
  if(merge){rem.collected.forEach(n=>collected.add(n));touchCol();applyCol();syncPush()}
  else if(rAt>colAt){collected=new Set(rem.collected);colAt=rAt;
    store.set('sb.col',JSON.stringify([...collected]));store.set('sb.colAt',String(colAt));applyCol()}
  else if(colAt>rAt){syncPush()}}

function renderSync(){const b=$('syncBody');
  if(!SYNC_API){b.innerHTML='<div class="empty">Синхронизация не настроена.</div>';return}
  if(!syncId){
    b.innerHTML=`<p class="sx">Синхронизируй коллекцию между устройствами. Без аккаунтов и почты — только анонимный код.</p>
      <button class="syncbtn go" id="syncOn">ВКЛЮЧИТЬ СИНХРОНИЗАЦИЮ</button>
      <div class="sxor">— ИЛИ —</div>
      <p class="sx">Уже включил на другом устройстве? Вставь код оттуда:</p>
      <div class="sxrow"><input id="syncInput" placeholder="код с другого устройства" autocomplete="off" autocapitalize="off" spellcheck="false"><button class="syncbtn" id="syncJoin">СВЯЗАТЬ</button></div>`;
    $('syncOn').onclick=async()=>{syncId=newSyncId();store.set('sb.sync',syncId);if(!colAt){colAt=Date.now();store.set('sb.colAt',String(colAt))}await syncPush();renderSync();tone(880,.06)};
    $('syncJoin').onclick=async()=>{const v=$('syncInput').value.trim();if(!ID_RE.test(v)){$('syncInput').classList.add('bad');return}
      syncId=v;store.set('sb.sync',syncId);await syncPull(true);renderSync();tone(880,.06)};
  }else{
    const link=location.origin+location.pathname+'?sync='+syncId;
    b.innerHTML=`<p class="sx ok">✓ Синхронизация включена</p>
      <p class="sx">Открой эту ссылку на другом устройстве — коллекция свяжется автоматически:</p>
      <div class="sxrow"><input id="syncLink" readonly value="${link}"><button class="syncbtn" id="syncCopy">КОПИРОВАТЬ</button></div>
      <p class="sx dim">Код связывания: <span class="code">${syncId}</span></p>
      <div class="sxrow2"><button class="syncbtn" id="syncNow">ОБНОВИТЬ СЕЙЧАС</button><button class="syncbtn danger" id="syncOff">ОТКЛЮЧИТЬ</button></div>`;
    $('syncCopy').onclick=()=>{const i=$('syncLink');i.focus();i.select();
      (navigator.clipboard?navigator.clipboard.writeText(link):Promise.reject()).catch(()=>{try{document.execCommand('copy')}catch(e){}});
      $('syncCopy').textContent='СКОПИРОВАНО';setTimeout(()=>$('syncCopy').textContent='КОПИРОВАТЬ',1500)};
    $('syncNow').onclick=async()=>{$('syncNow').textContent='…';await syncPull(false);await syncPush();$('syncNow').textContent='ГОТОВО';setTimeout(()=>$('syncNow').textContent='ОБНОВИТЬ СЕЙЧАС',1200)};
    $('syncOff').onclick=()=>{syncId='';store.set('sb.sync','');renderSync();tone(300,.05)};
  }}

if(SYNC_API){$('openSync').hidden=false;
  $('openSync').onclick=()=>{renderSync();$('syncOv').classList.add('show')};
  $('closeSync').onclick=()=>$('syncOv').classList.remove('show');
  $('syncOv').onclick=e=>{if(e.target===$('syncOv'))$('syncOv').classList.remove('show')};
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&syncId)syncPull(false)});
}

// ── База данных: живой список + локальные снапшоты + офлайн-фолбэк ──────────
// Первоисточник (обновляет автор репозитория, отдаётся с открытым CORS):
const LIVE_URL='https://raw.githubusercontent.com/bigbadraj/Letterboxd-List-JSONs/main/film_titles_letterboxds-top-500-films.json';
// приводим оба формата к единому виду {rank,title,year,id,poster}
function normalize(arr){return arr.map(x=>Array.isArray(x)
  ? {rank:x[0],title:x[1],year:String(x[2]),id:x[3]}
  : {rank:+(x.ListNumber??x.rank),title:x.Title??x.title,year:String(x.Year??x.year??''),id:x.ID??x.id,poster:x.poster||null})}
async function getJSON(url){const r=await fetch(url,{cache:'no-cache'});if(!r.ok)throw 0;return r.json()}
async function tryJSON(url){try{return normalize(await getJSON(url))}catch(e){return null}}

async function loadData(){
  // 1) локальная enriched-база с постерами (появится после enrich-posters.mjs)
  let base=await tryJSON('data/movies.enriched.json');
  // 2) локальный снапшот без постеров
  if(!base)base=await tryJSON('data/movies.json');
  // карта постеров по id из того, что нашли локально
  const pById={};if(base)base.forEach(m=>{if(m.poster)pById[m.id]=m.poster});
  // 3) живой список bigbadraj — свежие ранги, постеры домёрживаем по id
  let data=await tryJSON(LIVE_URL)||base;
  if(!data)return;                                   // ничего не догрузилось → остаёмся на вшитом снимке
  data.forEach(m=>{if(!m.poster&&pById[m.id])m.poster=pById[m.id]});
  data=data.filter(m=>m.rank&&m.title&&m.id).sort((a,b)=>a.rank-b.rank);
  if(data.length<100)return;                         // подозрительно мало — не доверяем, оставляем снимок
  MOVIES.length=0;data.forEach(m=>MOVIES.push(m));   // заменяем содержимое (MOVIES — const-массив)
  POSTER_URL={};MOVIES.forEach(m=>{if(m.poster)POSTER_URL[m.rank]=m.poster});
}

buildSegs();updateGauges();
(async()=>{
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  // грузим данные, но не дольше 2.5с; загрузочную анимацию держим минимум 0.9с
  await Promise.all([
    Promise.race([loadData().catch(()=>{}),wait(2500)]),
    wait(900)
  ]);
  $('cab').classList.remove('boot');
  const s=new Date().toISOString().slice(0,10).split('-').reduce((a,b)=>a+ +b,0);
  reveal(MOVIES[s%MOVIES.length],true);              // «фильм дня» детерминированно по дате
  // синхронизация: связать устройство по ?sync=… (из ссылки/QR) или подтянуть облако при старте
  if(SYNC_API){
    const linkId=new URLSearchParams(location.search).get('sync');
    if(linkId&&ID_RE.test(linkId)){syncId=linkId;store.set('sb.sync',syncId);
      history.replaceState(null,'',location.pathname);await syncPull(true)}
    else if(syncId){await syncPull(false)}
  }
  // service worker только когда сайт отдаётся по http(s) — двойной клик (file://) не трогаем
  if('serviceWorker'in navigator&&location.protocol.startsWith('http'))
    navigator.serviceWorker.register('sw.js').catch(()=>{});
})();
</script>
